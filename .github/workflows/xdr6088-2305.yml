name: Build ImmortalWrt for XDR6088 (23.05 Stable Edition)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "openwrt-23.05" 
  CONFIG_NAME: xdr6088-2305.config
  FIRMWARE_NAME: immortalwrt-xdr6088-2305

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Free Disk Space, Init Env, Create 10G Swap & Pre-install Rust
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/swift /usr/local/lib/node_modules
          
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version
          
          sudo -E apt-get update
          sudo -E apt-get install -y ccache ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libzstd-dev zstd

      - name: 3. Clone Correct OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      - name: 4. Cache Downloaded Packages (dl)
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          # 保持这个前缀，让 6088 能完美白嫖 7981 下载好的源码包
          key: ${{ runner.os }}-openwrt-dl-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: 5. Cache Ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # 更改前缀为 mt7986，防止和 7981 的编译缓存串味报错
          key: ${{ runner.os }}-openwrt-mt7986-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-mt7986-ccache-

      - name: 6. Load Feeds configurations
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 7. ✨ Generate the ULTIMATE .config file
        run: |
          [ -f ./diy-backup.sh ] && chmod +x ./diy-backup.sh
          cd immortalwrt
          
          cp ../$CONFIG_NAME .config
          
          [ -f ../diy-backup.sh ] && ../diy-backup.sh
          
          make defconfig
          cp .config ../$CONFIG_NAME-build

      - name: 8. Download packages
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

      - name: 9. Compile the firmware
        id: compile
        run: |
          cd immortalwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || {
            echo "多线程编译失败，正在使用单线程生成详细日志..."
            make -j1 V=s 2>&1 | tee compile_error.log
            exit 1
          }

      - name: 10. Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_compile_error_log
          path: immortalwrt/compile_error.log
          
      - name: 11. Package firmware
        if: success()
        run: |
          # 路径已适配 MT7986 架构
          cd immortalwrt/bin/targets/mediatek/mt7986
          rm -rf packages
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          mkdir -p firmware_release
          
          find . -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" \) -exec mv {} ./firmware_release/ \;
          cd firmware_release
          for f in *; do mv "$f" "xdr6088-23.05-${FIRMWARE_DATE}-${f}"; done
          
      - name: 12. Generate release tag
        if: success()
        run: |
          echo "release_tag=xdr6088-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "release_date=$(date +"%Y-%m-%d")" >> $GITHUB_ENV
          
      - name: 13. Upload firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.release_tag }}
          name: 🚀 TP-Link XDR6088 稳定版 23.05 (${{ env.release_date }})
          # 路径已适配 MT7986 架构
          files: immortalwrt/bin/targets/mediatek/mt7986/firmware_release/*
          body: |
            ## 🚀 TP-Link XDR6088 (MT7986) 黄金稳定版
            - 🚀 **核心优势**: 内核 5.15极简对运存友好 + 联发科官方闭源 Wi-Fi 加速+MediaTek HNAT
            - 🚀 **源码分支**: `openwrt-23.05` (内核 5.15)
            - 🚀 **目标设备**: TP-Link TL-XDR6088 (双 2.5G 网口旗舰)
            - ✈️ **科学双擎**: SSR-Plus (支持 UDP/MosDNS), HomeProxy (sing-box 内核)
            - 🛡️ **内网穿透**: Cloudflare Zero Trust (原生图形化面板)
            - 🌍 **异地组网**: WireGuard, ZeroTier
            
            ⚙️ **系统默认信息**:
            - 默认 IP: `192.168.51.1`
            - 默认密码: `无`
            - 编译时间: ${{ env.release_date }}
