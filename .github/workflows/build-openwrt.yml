#
# OpenClaw 为您量身打造的最终版 OpenWrt 编译工作流
# 源码: coolsnowwolf/lede (稳定, 插件兼容性好, 已集成NSS)
# 设备: JDC AX1800 Pro (ipq6000 / qualcommax)
# 特性: NSS 硬件加速, fw4 防火墙, 精简插件
#

name: Build OpenWrt by coolsnowwolf/lede

on:
  workflow_dispatch:

env:
  # 源码信息 - 我们现在使用 Lean 的仓库
  OPENWRT_SOURCE: https://github.com/coolsnowwolf/lede
  OPENWRT_BRANCH: master

  # 文件名定义
  CONFIG_NAME: jdc-ax1800-pro.config
  FIRMWARE_NAME: lede-qualcommax-nss

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout a copy of your repository
        uses: actions/checkout@v4

      - name: 2. Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          curl ccache device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged \
          help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build \
          p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply qemu-utils rsync scons \
          squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 3. Cache OpenWrt toolchain and downloads
        uses: actions/cache@v4
        with:
          path: |
            lede/staging_dir
            lede/dl
            lede/tmp
          key: ${{ runner.os }}-lede-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-lede-

      - name: 4. Clone OpenWrt source code
        run: |
          git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_SOURCE }} lede
          cd lede

      - name: 5. ✨ Add custom feeds (The Lean's Way)
        run: |
          cd lede
          # 这是 Lean 推荐的自定义方式：创建一个 diy 脚本来添加插件源
          cat > diy-part1.sh <<EOF
          #!/bin/bash
          # 添加 HomeProxy 和社区插件大礼包的源
          echo 'src-git homeproxy https://github.com/immortalwrt-community/homeproxy.git' >> feeds.conf.default
          echo 'src-git small https://github.com/kenzok8/small.git' >> feeds.conf.default
          EOF

          # 运行脚本并更新安装 feeds
          ./diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. ✨ Generate .config file for Lean's source
        run: |
          cd lede
          rm -f .config
          
          # 这份清单是为 Lean 的源码量身定制的
          cat > .config <<EOF
          # Target - Lean 的源使用 qualcommax 作为目标
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_generic=y
          # 为 IPQ60xx 设备选择 NSS 固件
          CONFIG_PACKAGE_nss-firmware-ipq6018=y

          # Base - Lean 的源自带 ttyd, 我们只需选择 LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          
          # Plugins (您需要的插件)
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_luci-app-reboot=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          EOF
          
          # 自动展开所有依赖
          make defconfig
          
          # 保存最终的 .config 文件以供调试
          cp .config ../${{ env.CONFIG_NAME }}

      - name: 7. Compile the firmware
        run: |
          cd lede
          make -j$(nproc) || make -j1 V=s

      - name: 8. Package firmware
        run: |
          #
          Lean源码的输出路径可能不同，我们用通配符来查找
          FIRMWARE_DIR=$(find lede/bin/targets -type d -name "qualcommax*")
          cd $FIRMWARE_DIR
          rm -rf packages
          # 为固件添加日期后缀
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          # 找到 JDC AX1800 Pro 的固件并重命名
          find . -name "*jdcloud_ax1800-pro*.ubi" -exec mv {} ../${{ env.FIRMWARE_NAME }}-${FIRMWARE_DATE}.ubi \;
          
      - name: 9. Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}-jdcloud_ax1800-pro
          # 使用通配符搜索固件，确保能找到
          path: lede/bin/targets/qualcommax*/*.ubi

      - name: 10. Upload .config file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CONFIG_NAME }}
          path: ./${{ env.CONFIG_NAME }}
