#
# OpenClaw 为您打造的【史诗最终版】MTK平台编译工作流
# 特性: 健壮的自动重试机制 + 完整的社区插件源
#

name: Build ImmortalWrt for MT7986 (Epic Final Edition)

on:
  workflow_dispatch:

env:
  OPENWRT_SOURCE: https://github.com/sagehou/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "2410"
  DEVICE_PROFILE: tplink_tl-xdr6088
  CONFIG_NAME: xdr6088.config
  FIRMWARE_NAME: immortalwrt-mt7986-xdr6088

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout a copy of your repository
        uses: actions/checkout@v4

      - name: 2. Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential curl ccache device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 3. Cache OpenWrt toolchain and downloads
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/staging_dir
            immortalwrt/dl
            immortalwrt/tmp
          key: ${{ runner.os }}-immortalwrt-mtk-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-mtk-

      - name: 4. Clone OpenWrt source code (with retry)
        run: |
          for i in 1 2 3; do
            if git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_SOURCE }} immortalwrt; then
              cd immortalwrt
              break
            fi
            echo "Clone attempt $i failed. Retrying in 1 minute..."
            sleep 60
            if [ $i -eq 3 ]; then
              echo "Failed to clone repository after 3 attempts."
              exit 1
            fi
          done

      # --- 【核心修正点】 ---
      - name: 5. ✨ Add all feeds and install (with retry)
        run: |
          cd immortalwrt
          # 这是我们最终的、完整的“购物清单”
          echo 'src-git small https://github.com/kenzok8/small.git' >> feeds.conf.default
          echo 'src-git homeproxy https://github.com/immortalwrt-community/homeproxy.git' >> feeds.conf.default

          for i in 1 2 3; do
            if ./scripts/feeds update -a && ./scripts/feeds install -a; then
              echo "Feeds updated and installed successfully."
              break
            fi
            echo "Feeds update/install attempt $i failed. Retrying in 1 minute..."
            sleep 60
            if [ $i -eq 3 ]; then
              echo "Failed to update feeds after 3 attempts."
              exit 1
            fi
          done

      - name: 6. ✨ Generate the final .config for MT7986
        run: |
          cd immortalwrt
          rm -f .config
          cat > .config <<EOF
          # Target - MTK 平台的目标是 mediatek/filogic
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_tplink_tl-xdr6088=y
          # Base
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          # Plugins (现在它们来自正确的源，可以和平共处)
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_luci-app-reboot=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          EOF
          make defconfig
          cp .config ../${{ env.CONFIG_NAME }}

      # 后续步骤保持不变...
      - name: 7. Compile the firmware
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: 8. Package firmware
        run: |
          cd immortalwrt/bin/targets/mediatek/filogic
          rm -rf packages
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          find . -name "*tplink_tl-xdr6088*.bin" -exec mv {} ../${{ env.FIRMWARE_NAME }}-${FIRMWARE_DATE}.bin \;
          
      - name: 9. Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}-${{ env.DEVICE_PROFILE }}
          path: immortalwrt/bin/targets/mediatek/filogic/*.bin

      - name: 10. Upload .config file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CONFIG_NAME }}
          path: ./${{ env.CONFIG_NAME }}

              
          
