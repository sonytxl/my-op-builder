#
# OpenClaw 为您量身打造的现代化 OpenWrt 编译工作流
# 设备: JDC AX1800 Pro (ipq6000)
# 特性: NSS 硬件加速, fw4 防火墙, 精简插件
#

name: Build OpenWrt for IPQ6000

on:
  # 允许您在 Actions 页面手动触发此工作流
  workflow_dispatch:

  # 您也可以在推送到 main 分支时自动触发，取消下面的注释即可
  # push:
  #   branches:
  #     - main

env:
  # 源码信息
  OPENWRT_SOURCE: https://github.com/robimarko/openwrt
  OPENWRT_BRANCH: ipq807x/master

  # 设备信息
  DEVICE_PROFILE: jdcloud_ax1800-pro

  # 文件名定义
  CONFIG_NAME: jdc-ax1800-pro.config
  FIRMWARE_NAME: immortalwrt-ipq6000-nss

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout a copy of your repository
        uses: actions/checkout@v4

       - name: 2. Install build dependencies
         run: |
           sudo apt-get update
           sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
           curl ccache device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged \
           help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
           libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build \
           p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply qemu-utils rsync scons \
           squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev 

      - name: 3. Cache OpenWrt toolchain and downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/dl
            openwrt/tmp
          key: ${{ runner.os }}-openwrt-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: 4. Clone OpenWrt source code
        run: |
          git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_SOURCE }} openwrt
          cd openwrt

      - name: 5. Update and install feeds & custom plugins
        run: |
          cd openwrt
          # 创建自定义 feeds 配置文件
          cat > feeds.conf.default <<EOF
          src-git packages https://git.immortalwrt.org/feed/packages.git
          src-git luci https://git.immortalwrt.org/feed/luci.git
          src-git routing https://git.immortalwrt.org/feed/routing.git
          src-git telephony https://git.immortalwrt.org/feed/telephony.git
          # 添加 HomeProxy, Passwall2 和 OpenClash 的源
          src-git homeproxy https://github.com/immortalwrt-community/homeproxy.git
          src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git
          src-git openclash https://github.com/vernesong/luci-app-openclash.git
          EOF
          
          # 更新并安装所有 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. ✨ Generate .config file (The Magic Step)
        run: |
          cd openwrt
          rm -f .config
          
          # 这就是我们的“装修清单”
          cat > .config <<EOF
          # Target
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_ax1800-pro=y
          
          # NSS Packages (核心)
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          
          # LuCI & Base
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-app-reboot=y # 定时重启
          CONFIG_PACKAGE_luci-app-ttyd=y    # 终端
          
          # Plugins (您需要的插件)
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          
          # Utilities
          CONFIG_PACKAGE_htop=y
          EOF
          
          # 自动展开所有依赖
          make defconfig
          
          # 保存最终的 .config 文件以供调试
          cp .config ../${{ env.CONFIG_NAME }}

      - name: 7. Compile the firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 8. Package firmware
        run: |
          cd openwrt/bin/targets/ipq60xx/generic
          rm -rf packages
          # 为固件添加日期后缀，方便识别
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          mv *.ubi ${FIRMWARE_NAME}-${FIRMWARE_DATE}.ubi
          mv *.bin ${FIRMWARE_NAME}-${FIRMWARE_DATE}.bin
          
      - name: 9. Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}-${{ env.DEVICE_PROFILE }}
          path: openwrt/bin/targets/ipq60xx/generic/*.{bin,ubi}

      - name: 10. Upload .config file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CONFIG_NAME }}
          path: ./${{ env.CONFIG_NAME }}
