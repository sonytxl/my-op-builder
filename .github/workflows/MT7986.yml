#
# OpenClaw 为您打造的【终极版】MTK平台编译工作流
# 策略: 在您最终的指引下，注入HNAT/WED硬件加速的灵魂！
#

name: Build ImmortalWrt for MT7986 (Ultimate HNAT Edition)

on:
  workflow_dispatch:

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "2410" 

  DEVICE_PROFILE: tplink_tl-xdr6088
  CONFIG_NAME: xdr6088-hnat.config
  FIRMWARE_NAME: immortalwrt-mt7986-xdr6088-hnat

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Initialization environment
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential curl ccache device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 3. Clone Correct OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt
          cd immortalwrt

      - name: 4. ✨ Load ONLY default configurations
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 5. ✨ Generate the ULTIMATE .config file with HNAT
        run: |
          cd immortalwrt
          rm -f .config
          cat > .config <<EOF
          # Target
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_tplink_tl-xdr6088=y

          # --- 【灵魂与躯体：同时启用硬件加速及其底层依赖】---
          # 1. 启用硬件加速包
          CONFIG_HW_FLOW_OFFLOADING=y
          CONFIG_PACKAGE_kmod-mtk-hnat=y
          CONFIG_PACKAGE_kmod-mtk-wed=y
          
          # 2. 启用它们依赖的底层内核功能 (这才是我们失败的关键)
          CONFIG_DMA_SHARED_BUFFER=y
          
          # Base System & LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-app-reboot=y
          EOF
          make defconfig
          cp .config ../$CONFIG_NAME

      - name: 6. Compile the firmware
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: 7. Package firmware
        run: |
          cd immortalwrt/bin/targets/mediatek/filogic
          rm -rf packages
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          find . -name "*tplink_tl-xdr6088*.bin" -exec mv {} ../$FIRMWARE_NAME-$FIRMWARE_DATE.bin \;
          
      - name: 8. Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}-${{ env.DEVICE_PROFILE }}
          path: immortalwrt/bin/targets/mediatek/filogic/*.bin


      - name: 9. Upload .config file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CONFIG_NAME }}
          path: ./${{ env.CONFIG_NAME }}


