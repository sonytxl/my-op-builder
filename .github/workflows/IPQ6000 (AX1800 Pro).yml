name: Build ImmortalWrt for IPQ6000 (AX1800 Pro)

on:
  workflow_dispatch:
  schedule:
    # 对应北京时间每月 2 号凌晨 00:00 (UTC 时间 1 号 16:00)
    - cron: '0 16 1 * *'

permissions:
  contents: write

env:
  OPENWRT_SOURCE: https://github.com/VIKINGYFY/immortalwrt
  OPENWRT_BRANCH: "main"
  CONFIG_NAME: ipq6000.config
  FIRMWARE_NAME: immortalwrt-jdcloud-ax1800-pro
  
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Free Disk Space, Init Env & Pre-install Rust
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version
          
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ccache ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libzstd-dev zstd

      - name: 3. Clone Correct OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      - name: 4. ⚡ Setup OpenWrt Ccache (精准定位源码内置缓存)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/immortalwrt/.ccache
          key: ${{ runner.os }}-openwrt-ipq6000-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ipq6000-ccache-

      - name: 5. Load Feeds configurations
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 6. ✨ Generate the .config file
        run: |
          chmod +x ./diy-ipq.sh
          cd immortalwrt
          
          cp ../$CONFIG_NAME .config
          ../diy-ipq.sh
          
          make defconfig
          cp .config ../$CONFIG_NAME-build

      - name: 7. Download packages
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

      - name: 8. Compile the firmware
        id: compile
        run: |
          cd immortalwrt
          echo -e "$(nproc) thread compile"
          # 移除了无效的 CCACHE_DIR 导出，让系统自动使用 ~/.ccache
          make -j$(nproc) || {
            echo "多线程编译失败，正在使用单线程生成详细日志..."
            make -j1 V=s 2>&1 | tee compile_error.log
            exit 1
          }

      - name: 9. Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_compile_error_log
          path: immortalwrt/compile_error.log
          
      - name: 10. Package firmware
        if: success()
        run: |
          mkdir -p firmware_release
          find immortalwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.ubi" \) -exec cp {} ./firmware_release/ \;
          cd firmware_release
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          for f in *; do mv "$f" "AX1800Pro-${FIRMWARE_DATE}-${f}"; done
          
      - name: 11. Generate release tag
        if: success()
        run: |
          echo "release_tag=$(TZ='Asia/Shanghai' date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "release_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M")" >> $GITHUB_ENV
          
      - name: 12. Upload firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.release_tag }}
          name: "🚀 JDCloud AX1800 Pro 闭源满血双擎版 (${{ env.release_date }})"
          files: firmware_release/*
          body: |
            ## 🚀 京东云亚瑟 (JDCloud AX1800 Pro) 专属固件（每月2号自动编译更新）
            - **源码仓库**: `VIKINGYFY/immortalwrt` (main 分支)
            - **核心特性**: 纯血高通闭源 Wi-Fi 驱动 + NSS 硬件加速
            
            🚀 **基础功能**:
            - 自动重启，终端，ddns，upnp
            
            🧩 **包含核心插件**:
            - ✈️ **科学双擎**: passwall (xray 内核), HomeProxy (sing-box 内核)
            - 🛡️ **内网穿透**: Cloudflare Zero Trust (原生图形化面板)
            - 🌍 **异地组网**: WireGuard, ZeroTier
            - 🗄️ **轻量 NAS**: Samba4
            - 🎨 **界面美化**: Argon 主题 + 完美中文支持
            
            ⚙️ **系统默认信息**:
            - 默认后台 IP: `192.168.61.1`
            - 默认密码: `无` (请登录后自行设置)
            - 默认 Wi-Fi 密码: `password`
            - 编译时间: ${{ env.release_date }}
