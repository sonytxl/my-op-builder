name: Build ImmortalWrt for XDR6088 (2410 Low-RAM Edition)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "2410" 
  CONFIG_NAME: xdr6088-2410.config
  FIRMWARE_NAME: immortalwrt-xdr6088-2410

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Free Disk Space (极致清理)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 3. Init Env, Create 10G Swap & Install Rust
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version
          
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libzstd-dev zstd

      - name: 4. Clone OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      - name: 5. Setup ccache (保卫缓存)
        uses: actions/cache@v4
        with:
          path: immortalwrt/.ccache
          key: ${{ runner.os }}-openwrt-mt7986-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-mt7986-ccache-
            ${{ runner.os }}-openwrt-mt7981-ccache-

      - name: 6. Load Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 7. ✨ Generate the .config file
        run: |
          chmod +x ./diy-mtk-2410.sh
          cd immortalwrt
          
          cp ../$CONFIG_NAME .config
          ../diy-mtk-2410.sh
          
          make defconfig
          cp .config ../$CONFIG_NAME-build

      - name: 8. Download packages
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

      - name: 9. Compile the firmware
        id: compile
        run: |
          cd immortalwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || {
            echo "多线程编译失败，正在使用单线程生成详细日志..."
            make -j1 V=s 2>&1 | tee compile_error.log
            exit 1
          }

      - name: 10. Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MTK_compile_error_log
          path: immortalwrt/compile_error.log
          
      - name: 11. Package firmware
        if: success()
        run: |
          mkdir -p firmware_release
          find immortalwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.ubi" \) -exec cp {} ./firmware_release/ \;
          cd firmware_release
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          for f in *; do mv "$f" "XDR6088-${FIRMWARE_DATE}-${f}"; done
          
      - name: 12. Generate release tag (注入北京时间)
        if: success()
        run: |
          echo "release_tag=$(TZ='Asia/Shanghai' date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "release_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M")" >> $GITHUB_ENV
          
      - name: 13. Upload firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.release_tag }}
          name: 🚀 MTK 7986 (XDR6088) 低运存极速版 2410 (${{ env.release_date }})
          files: firmware_release/*
          body: |
            ## 🚀 TP-Link XDR6088 专属固件 (Padavanonly 2410分支)
            - **源码仓库**: `padavanonly/immortalwrt-mt798x-6.6`
            - **分支版本**: `2410` (闭源内核 5.4)
            - **核心优势**: 专为 512M 运存极度优化，剔除高内存消耗组件
            
            💡 **适配机型**:
            - 完美支持：`TP-Link TL-XDR6088` (128M 大分区版)
            
            📦 **核心功能与插件**:
            - ✈️ **科学极简**: Passwall, HomeProxy (纯净无 SSR-Plus 依赖)
            - 🌍 **异地组网**: WireGuard, ZeroTier
            
            ⚙️ **系统默认信息**:
            - 默认 IP: `192.168.51.1`
            - 默认密码: `无`
            - 编译时间: ${{ env.release_date }}
