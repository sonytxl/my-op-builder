
name: Build ImmortalWrt for MT7986 xdr6088 (Ultimate Speed Edition)

on:
  workflow_dispatch:

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "openwrt-24.10-6.6" 

  DEVICE_PROFILE: tplink_tl-xdr6088
  CONFIG_NAME: xdr6088-hnat.config
  FIRMWARE_NAME: immortalwrt-mt7986-xdr6088-hnat

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Free Disk Space & Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 极速清理不必要的系统级组件，瞬间释放空间
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          # 安装编译依赖，加入 ccache 支持
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential curl ccache device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 3. Clone Correct OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      # 引入 Github Actions 的缓存机制，针对 ccache 进行缓存
      - name: 4. Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # 缓存 key 根据操作系统和工作流名称生成，只要不清理缓存，后续编译直接起飞
          key: ${{ runner.os }}-openwrt-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-

      - name: 5. ✨ Generate the ULTIMATE .config file (Using Author's Defconfig)
        run: |
          cd immortalwrt
          
          # 1. 核心破局：直接复制作者调教好的 MT7986 完美闭源驱动模板
          cp -f defconfig/mt7986-ax6000.config .config
          
          # 2. 在完美模板的基础上，追加我们专属的 XDR6088 设定和必要插件
          cat >> .config <<EOF
          
          # 覆盖/追加目标设备为 XDR6088
          CONFIG_TARGET_mediatek_filogic_DEVICE_tplink_tl-xdr6088=y
          
          # 基础 UI 界面 (模板里可能没包含，保险起见加上)
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-app-reboot=y
          EOF
          
          # 3. 运行 defconfig，让引擎将模板和我们的追加要求完美融合
          make defconfig
          cp .config ../$CONFIG_NAME
          
      - name: 6. ✨ Generate the ULTIMATE .config file
        run: |
          cd immortalwrt
          rm -f .config
          cat > .config <<EOF
          # Target - filogic 架构匹配 6.6 分支
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_tplink_tl-xdr6088=y

          # --- 核心优化：开启编译器缓存 ---
          CONFIG_CCACHE=y
          
          # Base System & LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-app-reboot=y
          EOF
          make defconfig
          cp .config ../$CONFIG_NAME

      - name: 7. Download packages
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

      - name: 8. Compile the firmware
        id: compile
        run: |
          cd immortalwrt
          # 记录编译状态，失败则返回非 0 值触发下一步的容错
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s

      # 当第8步编译失败时，自动打包 build_dir 和 logs 中的报错信息
      - name: 9. Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_compile_logs
          path: immortalwrt/logs/
          
      - name: 10. Package firmware
        if: success()
        run: |
          cd immortalwrt/bin/targets/mediatek/filogic
          rm -rf packages
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          # 将所有生成的固件放入统一文件夹方便打包
          mkdir -p firmware_release
          find . -name "*tplink_tl-xdr6088*.bin" -exec mv {} ./firmware_release/ \;
          cd firmware_release
          for f in *.bin; do mv "$f" "${FIRMWARE_NAME}-${FIRMWARE_DATE}-${f}"; done
          
      - name: 11. Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}-release
          path: immortalwrt/bin/targets/mediatek/filogic/firmware_release/*.bin
