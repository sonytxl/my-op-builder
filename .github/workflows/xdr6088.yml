name: Build ImmortalWrt for MT7986 xdr6088 (Release Edition)

on:
  workflow_dispatch:

# ⚠️ 极其重要：赋予 GitHub Actions 创建和写入 Release 的权限
permissions:
  contents: write

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "openwrt-24.10-6.6" 

  DEVICE_PROFILE: tplink_tl-xdr6088
  CONFIG_NAME: xdr6088-hnat.config
  FIRMWARE_NAME: immortalwrt-mt7986-xdr6088-hnat

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Free Disk Space & Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libzstd-dev zstd

      - name: 3. Clone Correct OpenWrt source code
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      - name: 4. Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-

      - name: 5. Load Feeds configurations
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 6. ✨ Generate the ULTIMATE .config file
        run: |
          chmod +x ./diy.sh
          cd immortalwrt
          cp ../xdr6088.config .config
          ../diy.sh
          make defconfig
          cp .config ../$CONFIG_NAME

      - name: 7. Download packages
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

      - name: 8. Compile the firmware
        id: compile
        run: |
          cd immortalwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || {
            echo "多线程编译失败，正在使用单线程生成详细日志..."
            make -j1 V=s 2>&1 | tee compile_error.log
            exit 1
          }

      - name: 9. Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_compile_error_log
          path: immortalwrt/compile_error.log
          
      - name: 10. Package firmware
        if: success()
        run: |
          cd immortalwrt/bin/targets/mediatek/filogic
          rm -rf packages
          FIRMWARE_DATE=$(date +%Y-%m-%d)
          mkdir -p firmware_release
          find . -name "*tplink_tl-xdr6088*.bin" -exec mv {} ./firmware_release/ \;
          cd firmware_release
          for f in *.bin; do mv "$f" "${FIRMWARE_NAME}-${FIRMWARE_DATE}-${f}"; done
          
      # --- 下面这两步是实现自动上传 Releases 的魔法 ---
      - name: 11. Generate release tag
        if: success()
        run: |
          # 自动生成当前时间的标签，例如 2026.03.19-1430
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "release_date=$(date +"%Y-%m-%d")" >> $GITHUB_ENV
          
      - name: 12. Upload firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.release_tag }}
          name: 🚀 ImmortalWrt 24.10 闭源驱动版 - XDR6088 (${{ env.release_date }})
          files: immortalwrt/bin/targets/mediatek/filogic/firmware_release/*.bin
          body: |
            ## 🚀 XDR6088 专属满血固件
            - **源码分支**: `padavanonly/immortalwrt-mt798x-6.6`
            - **核心特性**: 纯血闭源 Wi-Fi 驱动 + WED/HNAT 硬件加速
            - **编译时间**: ${{ env.release_date }}
            
            **系统默认信息**:
            - 默认 IP: `192.168.50.1` (根据 diy.sh 设定)
            - 默认密码: `无` (请登录后自行设置)
